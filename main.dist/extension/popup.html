<!DOCTYPE html>
<html>
<head>
  <title>VEO Pro Max Bridge</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 12px;
      width: 320px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 15px;
      color: #e94560;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      background: #16213e;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #51cf66; }
    .dot.disconnected { background: #ff6b6b; }
    .label { font-size: 13px; }
    .tabs-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .tabs-list li {
      padding: 6px 10px;
      margin-bottom: 4px;
      background: #16213e;
      border-radius: 6px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
    }
    .tabs-list li .email { color: #a7c957; }
    .tabs-list li .info { color: #888; }
    .empty { color: #666; font-size: 12px; font-style: italic; }
  </style>
</head>
<body>
  <h2>🧩 VEO Pro Max Bridge</h2>

  <div class="status" id="wsStatus">
    <span class="dot disconnected" id="wsDot"></span>
    <span class="label" id="wsLabel">Checking...</span>
  </div>

  <h3 style="font-size:13px; margin:8px 0 6px; color:#ccc;">Active Tabs</h3>
  <ul class="tabs-list" id="tabsList">
    <li class="empty">Loading...</li>
  </ul>

  <script src="popup.js"></script>
</body>
</html>
